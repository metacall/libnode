name: 'Setup ccache'
description: 'Configures, restores, and saves ccache for build jobs'
inputs:
  arch:
    required: true
    description: 'The architecture string for the cache key (e.g., amd64, arm64)'
runs:
  using: "composite"
  steps:
    - name: Setup cache
      uses: actions/cache@v4
      with:
        path: .ccache
        key: ${{ github.workflow }}-${{ inputs.arch }}-${{ hashFiles('**/version.txt') }}
        restore-keys: |
          ${{ github.workflow }}-${{ inputs.arch }}-
        save-always: true