name: Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  update:
    name: Windows
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            os: windows-2025-vs2026
          - arch: arm64
            os: windows-11-vs2026-arm

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'latest'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Setup NASM
        uses: ilammy/setup-nasm@v1

      - name: Setup Ninja
        run: choco install -y ninja

      - name: Run the script
        env:
          ARCH: ${{ matrix.arch }}
        run: node index.js

      - name: Create archive
        run: |
          cd node\out\Release
          dir libnode.*, node.*
          curl.exe -sO https://nodejs.org/dist/${{ github.ref_name }}/node-${{ github.ref_name }}-headers.tar.gz
          tar.exe -xzf node-${{ github.ref_name }}-headers.tar.gz
          move node-${{ github.ref_name }}\include .\include
          7z a -mx9 "libnode-${{ matrix.arch }}-windows.zip" libnode.* node.* include

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          overwrite: true
          tag: ${{ github.ref }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: node\out\Release\libnode-${{ matrix.arch }}-windows.zip
