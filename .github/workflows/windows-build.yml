name: Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  update:
    name: Windows
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            os: windows-2025-vs2026
          - arch: arm64
            os: windows-11-vs2026-arm

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node Version
        uses: ./.github/actions/setup-version

      - name: Setup Ninja
        run: choco install -y python nasm ninja

      - name: Build NodeJS
        env:
          ARCH: ${{ matrix.arch }}
        shell: pwsh
        run: |
          cmd.exe /c "scripts\build.bat 2>&1" | Tee-Object -FilePath "build-failure-${{ matrix.arch }}-windows.log"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Create archive
        if: success()
        run: |
          cd node\out\Release
          dir libnode.*, node.*
          7z a -mx9 "libnode-${{ matrix.arch }}-windows.zip" libnode.* node.*

      - name: Handle Release Assets
        if: always()
        uses: ./.github/actions/upload-assets
        with:
          os_name: windows
          arch: ${{ matrix.arch }}
          job_status: ${{ job.status }}
          node_version: ${{ env.NODE_VERSION }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          archive_path: node\out\Release\libnode-${{ matrix.arch }}-windows.zip