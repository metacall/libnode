name: Linux

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  update:
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            os: ubuntu-26.04
          - arch: arm64
            os: ubuntu-26.04-arm

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Read version from version.txt
        shell: bash
        run: echo "NODE_VERSION=$(head -n 1 version.txt | tr -d '\r\n')" >> $GITHUB_ENV

      - name: Restore ccache
        id: cache-ccache-restore
        uses: actions/cache/restore@v5
        with:
          path: .ccache
          key: ${{ github.workflow }}-${{ matrix.arch }}-${{ hashFiles('**/version.txt') }}
          restore-keys: |
            ${{ github.workflow }}-${{ matrix.arch }}-${{ hashFiles('**/version.txt') }}
            ${{ github.workflow }}-${{ matrix.arch }}-

      - name: Install building tools
        run: |
          sudo apt-get update && sudo apt-get upgrade -y
          sudo apt-get install -y git python3 python3-pip gcc g++ make nasm ccache

      - name: Run the script
        env:
          ARCH: ${{ matrix.arch }}
          CC: "gcc"
          CXX: "g++"
        run: |
          export CCACHE_COMPRESS="true"
          export CCACHE_BASEDIR="$GITHUB_WORKSPACE"
          export CCACHE_DIR="$CCACHE_BASEDIR/.ccache"
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          mkdir -p "$CCACHE_DIR"

          bash scripts/build.sh

      - name: Create archive
        run: |
          cd node/out/Release
          ln libnode.so.* libnode.so
          ls -lh libnode.* node
          tar -cJf "libnode-${{ matrix.arch }}-linux.tar.xz" libnode.* node

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          overwrite: true
          tag: ${{ env.NODE_VERSION }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: node/out/Release/libnode-${{ matrix.arch }}-linux.tar.xz
          body: |
            Changelog: https://github.com/nodejs/node/releases/tag/${{ env.NODE_VERSION }}

      - name: Save ccache (Always)
        id: cache-ccache-save
        if: always() && steps.cache-ccache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .ccache
          key: ${{ steps.cache-ccache-restore.outputs.cache-primary-key }}
